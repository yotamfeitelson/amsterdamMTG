<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagicCon Amsterdam 2026 - My Schedule</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b1a;--surface:#16132b;--card:#1e1a35;--border:#2a2548;
  --text:#e8e6f0;--text-dim:#9e9bb5;--gold:#ffc107;--accent:#7c4dff;
  --slot-h:40px;
}
html{scrollbar-color:#2a2548 #0d0b1a}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* HEADER */
.header{text-align:center;padding:18px 16px 10px;background:linear-gradient(135deg,#1a1040 0%,#0d0b1a 100%);border-bottom:2px solid var(--gold)}
.header h1{font-size:1.6rem;color:var(--gold);letter-spacing:1px}
.header .sub{font-size:.85rem;color:var(--text-dim);margin-top:4px}

/* DAY TABS */
.tabs{display:flex;justify-content:center;gap:6px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .15s}
.tab:hover{border-color:var(--gold);color:var(--text)}
.tab.active{background:var(--gold);color:#0d0b1a;border-color:var(--gold)}

/* FILTER BAR */
.filter-bar{position:sticky;top:52px;z-index:99;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px}
.filter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.filter-header span{font-size:.8rem;color:var(--text-dim)}
.filter-header .count{color:var(--gold);font-weight:600}
.clear-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:.75rem;transition:all .15s}
.clear-btn:hover{border-color:var(--gold);color:var(--gold)}
.tag-filters{display:flex;flex-wrap:wrap;gap:5px}
.tag-btn{padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:500;cursor:pointer;border:1px solid;opacity:.55;transition:all .15s;white-space:nowrap}
.tag-btn:hover{opacity:.85}
.tag-btn.active{opacity:1;box-shadow:0 0 8px rgba(255,255,255,.15)}
.tag-btn.fav::before{content:'\2605 ';font-size:.65rem}

/* CALENDAR CONTAINER */
.cal-wrap{display:flex;overflow-x:auto;padding:0 8px 20px;position:relative}
.time-axis{width:60px;min-width:60px;padding-top:8px;position:sticky;left:0;z-index:10;background:var(--bg)}
.time-label{height:var(--slot-h);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;font-size:.7rem;color:var(--text-dim);transform:translateY(-6px)}
.grid-area{flex:1;position:relative;min-width:600px}
.grid-lines{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.grid-line{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.grid-line.hour{background:rgba(255,255,255,.06)}
.grid-line.half{background:rgba(255,255,255,.025)}

/* EVENT CARDS */
.ev{position:absolute;border-radius:5px;background:rgba(30,26,53,.92);border-left:3px solid #607d8b;padding:4px 6px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,z-index 0s;font-size:.72rem;display:flex;flex-direction:column;gap:1px;backdrop-filter:blur(4px);z-index:1;word-wrap:break-word;min-width:0}
.ev:hover{box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:50!important}
.ev-name{font-weight:600;overflow:hidden;line-height:1.2;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.ev-name a{color:var(--text)}
.ev-name a:hover{text-decoration:underline;color:var(--gold)}
.ev-time{color:var(--text-dim);font-size:.65rem}
.ev-price{color:var(--gold);font-size:.65rem;font-weight:500}
.ev-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:auto}
.ev-tag{padding:1px 5px;border-radius:8px;font-size:.55rem;font-weight:500;opacity:.8;white-space:nowrap}

/* STAR BUTTON */
.ev-star{position:absolute;top:2px;right:4px;font-size:.85rem;cursor:pointer;opacity:.35;transition:all .15s;z-index:2;line-height:1;user-select:none}
.ev-star:hover{opacity:.8;transform:scale(1.2)}
.ev-star.starred{opacity:1;color:var(--gold);text-shadow:0 0 6px rgba(255,193,7,.5)}
.ev.starred-card{box-shadow:0 0 8px rgba(255,193,7,.35);border-left-color:var(--gold)!important}

/* STARRED FILTER */
.starred-btn{padding:4px 12px;border-radius:12px;font-size:.72rem;font-weight:600;cursor:pointer;border:2px solid var(--gold);color:var(--gold);background:transparent;opacity:.65;transition:all .15s;white-space:nowrap;margin-right:8px}
.starred-btn:hover{opacity:.9}
.starred-btn.active{opacity:1;background:rgba(255,193,7,.15);box-shadow:0 0 8px rgba(255,193,7,.25)}

/* COST PANEL */
.cost-panel{display:none;max-width:900px;margin:20px auto;padding:0 16px}
.cost-panel.visible{display:block}
.cost-search{position:relative;margin-bottom:20px}
.cost-search input{width:100%;padding:10px 14px;font-size:.9rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.cost-search input:focus{border-color:var(--gold)}
.cost-search input::placeholder{color:var(--text-dim)}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;z-index:200;display:none}
.ac-dropdown.show{display:block}
.ac-item{padding:8px 14px;cursor:pointer;font-size:.82rem;display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.ac-item:hover{background:rgba(255,193,7,.08)}
.ac-item .ac-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-item .ac-meta{color:var(--text-dim);font-size:.72rem;white-space:nowrap}
.ac-item .ac-star{color:var(--gold);font-size:.75rem;margin-left:6px;opacity:.5}
.ac-item .ac-star.is-starred{opacity:1}

.cost-day-group{margin-bottom:16px}
.cost-day-title{font-size:.85rem;font-weight:700;color:var(--gold);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:6px}
.cost-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:.82rem;transition:background .1s}
.cost-row:hover{background:rgba(255,255,255,.03)}
.cost-row .cr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cost-row .cr-name a{color:var(--text)}
.cost-row .cr-name a:hover{color:var(--gold);text-decoration:underline}
.cost-row .cr-time{color:var(--text-dim);font-size:.72rem;white-space:nowrap;min-width:120px}
.cost-row .cr-price{color:var(--gold);font-weight:600;min-width:60px;text-align:right}
.cost-row .cr-remove{cursor:pointer;color:var(--text-dim);font-size:.9rem;padding:2px 6px;border-radius:4px;transition:all .15s}
.cost-row .cr-remove:hover{color:#f44336;background:rgba(244,67,54,.1)}

.cost-total{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);border:2px solid var(--gold);border-radius:8px;margin-top:20px;font-size:1rem}
.cost-total .ct-label{color:var(--text);font-weight:600}
.cost-total .ct-amount{color:var(--gold);font-weight:700;font-size:1.3rem}
.cost-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:.9rem}
.cost-empty .ce-icon{font-size:2rem;margin-bottom:8px}

/* TOOLTIP */
.tooltip{display:none;position:fixed;z-index:1000;background:#1e1a35;border:1px solid var(--gold);border-radius:8px;padding:12px;max-width:380px;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.7);pointer-events:none}
.tooltip.show{display:block}
.tooltip .tt-name{font-weight:700;font-size:.9rem;color:var(--gold);margin-bottom:4px;line-height:1.3}
.tooltip .tt-time{font-size:.8rem;color:var(--text-dim);margin-bottom:2px}
.tooltip .tt-price{font-size:.8rem;color:var(--gold);margin-bottom:6px}
.tooltip .tt-desc{font-size:.75rem;color:var(--text);line-height:1.4;max-height:120px;overflow-y:auto}
.tooltip .tt-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.tooltip .tt-tag{padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:500}

/* FOOTER */
.footer{text-align:center;padding:20px 16px;font-size:.72rem;color:var(--text-dim);border-top:1px solid var(--border);line-height:1.6}
.footer a{color:var(--gold)}

@media(max-width:700px){
  .header h1{font-size:1.2rem}
  .tab{padding:6px 12px;font-size:.8rem}
  .filter-bar{padding:8px 10px}
  .time-axis{width:45px;min-width:45px}
  .time-label{font-size:.6rem}
}
</style>
</head>

const TAG_COLORS = {
  'Commander':'#4caf50','Commander Party':'#4caf50','Precon':'#4caf50','cEDH':'#4caf50',
  'Sealed':'#2196f3','Full Box Sealed':'#2196f3','Collector':'#2196f3',
  'Draft':'#ff9800','Mega-Draft':'#ff9800',
  'Chaos':'#f44336',
  'Constructed':'#9c27b0','Standard':'#9c27b0','Modern':'#9c27b0','Legacy':'#9c27b0','Vintage':'#9c27b0','Pauper':'#9c27b0',
  'Team':'#009688','2HG':'#009688','Trios':'#009688',
  'Cup':'#ffc107','Top 8':'#ffc107','Pro Tour Qualifier':'#ffc107','Limited Championship Qualifier':'#ffc107',
  'Unknown':'#e91e63','Hosted':'#e91e63'
};
const DEFAULT_COLOR = '#607d8b';
const FAVORITES = new Set(['Sealed','Commander','Chaos','Draft','Mega-Draft','Commander Party','Precon','Unknown','Hosted']);

const ALL_TAGS = ['2HG','All Play','Battlebox','cEDH','Chaos','Collector','Commander','Commander Party','Constructed','Cup','Draft','FNM','Friday Night Magic','Full Box Sealed','Gauntlet','Grand Melee','Hosted','League','Legacy','Limited Championship Qualifier','Mega-Draft','Mini-masters','Mixed Format','Modern','Pauper','Pick-Two','Pin Trading','Precon','Pro Tour Qualifier','Sealed','Secret Lair','Sneaky Snacker','Standard','Team','Top 8','Trios','Turbo','Unknown','Vintage'];

const GRID_START = 9; // 9 AM
const GRID_END = 23;  // 11 PM
const SLOT_H = 40;
const TOTAL_SLOTS = (GRID_END - GRID_START) * 2;

function tagColor(t) { return TAG_COLORS[t] || DEFAULT_COLOR; }
function primaryColor(ev) {
  for (const t of ev.tags) { if (TAG_COLORS[t]) return TAG_COLORS[t]; }
  return DEFAULT_COLOR;
}

// State
let activeDay = '2026-07-17';
let activeTags = new Set();
let starredIds = new Set(JSON.parse(localStorage.getItem('starred') || '[]'));
let starredFilterActive = false;

function saveStarred() {
  localStorage.setItem('starred', JSON.stringify([...starredIds]));
  updateStarredCount();
}
function toggleStar(id) {
  if (starredIds.has(id)) starredIds.delete(id);
  else starredIds.add(id);
  saveStarred();
}
function updateStarredCount() {
  document.getElementById('starredCount').textContent = '(' + starredIds.size + ')';
}

// Build time axis
const timeAxis = document.getElementById('timeAxis');
const gridLines = document.getElementById('gridLines');
for (let i = 0; i <= TOTAL_SLOTS; i++) {
  const h = GRID_START + Math.floor(i / 2);
  const m = (i % 2) * 30;
  if (m === 0) {
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    const hr = h > 12 ? h - 12 : h;
    const ampm = h >= 12 ? 'PM' : 'AM';
    lbl.textContent = hr + ':00 ' + ampm;
    lbl.style.height = SLOT_H + 'px';
    timeAxis.appendChild(lbl);
    // half-hour spacer
    if (i < TOTAL_SLOTS) {
      const spacer = document.createElement('div');
      spacer.className = 'time-label';
      spacer.style.height = SLOT_H + 'px';
      timeAxis.appendChild(spacer);
    }
  }
  // Grid line
  const line = document.createElement('div');
  line.className = 'grid-line ' + (m === 0 ? 'hour' : 'half');
  line.style.top = (i * SLOT_H) + 'px';
  gridLines.appendChild(line);
}
document.getElementById('gridArea').style.height = (TOTAL_SLOTS * SLOT_H) + 'px';

// Build tag filter buttons
const tagFiltersEl = document.getElementById('tagFilters');
ALL_TAGS.forEach(tag => {
  const btn = document.createElement('div');
  btn.className = 'tag-btn' + (FAVORITES.has(tag) ? ' fav' : '');
  btn.textContent = tag;
  const c = tagColor(tag);
  btn.style.borderColor = c;
  btn.style.color = c;
  btn.dataset.tag = tag;
  btn.addEventListener('click', () => toggleTag(tag, btn));
  tagFiltersEl.appendChild(btn);
});

function toggleTag(tag, btn) {
  if (activeTags.has(tag)) { activeTags.delete(tag); btn.classList.remove('active'); btn.style.background = ''; }
  else { activeTags.add(tag); btn.classList.add('active'); btn.style.background = tagColor(tag) + '22'; }
  render();
}
document.getElementById('clearBtn').addEventListener('click', () => {
  activeTags.clear();
  starredFilterActive = false;
  document.getElementById('starredFilterBtn').classList.remove('active');
  tagFiltersEl.querySelectorAll('.tag-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  render();
});

// Starred filter button
document.getElementById('starredFilterBtn').addEventListener('click', () => {
  starredFilterActive = !starredFilterActive;
  document.getElementById('starredFilterBtn').classList.toggle('active', starredFilterActive);
  render();
});

// Day tabs
document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  const day = t.dataset.day;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');

  if (day === 'cost') {
    document.querySelector('.cal-wrap').style.display = 'none';
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('costPanel').classList.add('visible');
    renderCostPanel();
  } else {
    activeDay = day;
    document.querySelector('.cal-wrap').style.display = '';
    document.getElementById('filterBar').style.display = '';
    document.getElementById('costPanel').classList.remove('visible');
    render();
  }
});

// Overlap column packing
function layoutEvents(events) {
  const sorted = [...events].sort((a, b) => (a.sH * 60 + a.sM) - (b.sH * 60 + b.sM));
  const columns = []; // each column: array of events with computed end time
  const evCols = new Map(); // event id -> column index
  const groups = []; // groups of overlapping events

  // Assign columns
  sorted.forEach(ev => {
    const start = ev.sH * 60 + ev.sM;
    const end = ev.eH * 60 + ev.eM;
    let placed = false;
    for (let c = 0; c < columns.length; c++) {
      const last = columns[c][columns[c].length - 1];
      const lastEnd = last.eH * 60 + last.eM;
      if (start >= lastEnd) {
        columns[c].push(ev);
        evCols.set(ev.id, c);
        placed = true;
        break;
      }
    }
    if (!placed) {
      evCols.set(ev.id, columns.length);
      columns.push([ev]);
    }
  });

  // Group overlapping events to determine max columns per group
  function eventsOverlap(a, b) {
    const aS = a.sH * 60 + a.sM, aE = a.eH * 60 + a.eM;
    const bS = b.sH * 60 + b.sM, bE = b.eH * 60 + b.eM;
    return aS < bE && bS < aE;
  }

  // Build connected components of overlapping events
  const visited = new Set();
  sorted.forEach(ev => {
    if (visited.has(ev.id)) return;
    const group = [ev];
    visited.add(ev.id);
    let i = 0;
    while (i < group.length) {
      const cur = group[i];
      sorted.forEach(other => {
        if (!visited.has(other.id) && eventsOverlap(cur, other)) {
          visited.add(other.id);
          group.push(other);
        }
      });
      i++;
    }
    groups.push(group);
  });

  // For each group, find max column index
  const result = [];
  groups.forEach(group => {
    let maxCol = 0;
    group.forEach(ev => { maxCol = Math.max(maxCol, evCols.get(ev.id)); });
    const numCols = maxCol + 1;
    group.forEach(ev => {
      result.push({ ev, col: evCols.get(ev.id), numCols });
    });
  });
  return result;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
let tooltipTimer;
function showTooltip(ev, rect) {
  clearTimeout(tooltipTimer);
  tooltip.querySelector('.tt-name').textContent = ev.name;
  tooltip.querySelector('.tt-time').textContent = ev.time;
  tooltip.querySelector('.tt-price').textContent = ev.price;
  tooltip.querySelector('.tt-desc').textContent = ev.desc;
  const tagsEl = tooltip.querySelector('.tt-tags');
  tagsEl.innerHTML = '';
  ev.tags.forEach(t => {
    const s = document.createElement('span');
    s.className = 'tt-tag';
    const c = tagColor(t);
    s.style.background = c + '33';
    s.style.color = c;
    s.textContent = t;
    tagsEl.appendChild(s);
  });
  tooltip.classList.add('show');
  // Position
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = rect.right + 10;
  let top = rect.top;
  tooltip.style.left = '0'; tooltip.style.top = '0';
  // measure
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  if (left + tw > vw - 10) left = rect.left - tw - 10;
  if (left < 10) left = 10;
  if (top + th > vh - 10) top = vh - th - 10;
  if (top < 10) top = 10;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}
function hideTooltip() {
  tooltipTimer = setTimeout(() => tooltip.classList.remove('show'), 100);
}

// Render
function render() {
  const grid = document.getElementById('gridArea');
  grid.querySelectorAll('.ev').forEach(el => el.remove());

  let dayEvents = EVENTS.filter(ev => ev.date === activeDay);
  let filtered;
  if (activeTags.size === 0) {
    filtered = dayEvents;
  } else {
    filtered = dayEvents.filter(ev => ev.tags.some(t => activeTags.has(t)));
  }
  // Apply starred filter
  if (starredFilterActive) {
    filtered = filtered.filter(ev => starredIds.has(ev.id));
  }

  // Count across all days
  let totalVisible = 0;
  if (activeTags.size === 0 && !starredFilterActive) totalVisible = EVENTS.length;
  else {
    totalVisible = EVENTS.filter(ev => {
      if (starredFilterActive && !starredIds.has(ev.id)) return false;
      if (activeTags.size > 0 && !ev.tags.some(t => activeTags.has(t))) return false;
      return true;
    }).length;
  }
  document.getElementById('evCount').textContent = filtered.length + ' events shown (' + totalVisible + ' total)';
  updateStarredCount();

  const laid = layoutEvents(filtered);
  laid.forEach(({ ev, col, numCols }) => {
    const startMin = (ev.sH - GRID_START) * 60 + ev.sM;
    const endMin = (ev.eH - GRID_START) * 60 + ev.eM;
    const top = (startMin / 30) * SLOT_H;
    const height = Math.max(((endMin - startMin) / 30) * SLOT_H, SLOT_H);

    const colW = 100 / numCols;
    const left = col * colW;

    const card = document.createElement('div');
    card.className = 'ev' + (starredIds.has(ev.id) ? ' starred-card' : '');
    card.style.top = top + 'px';
    card.style.height = height + 'px';
    card.style.left = left + '%';
    card.style.width = 'calc(' + colW + '% - 4px)';
    card.style.borderLeftColor = starredIds.has(ev.id) ? '#ffc107' : primaryColor(ev);

    // Star button
    const starEl = document.createElement('div');
    starEl.className = 'ev-star' + (starredIds.has(ev.id) ? ' starred' : '');
    starEl.textContent = '★';
    starEl.title = starredIds.has(ev.id) ? 'Remove from list' : 'Add to list';
    starEl.addEventListener('click', e => {
      e.stopPropagation();
      toggleStar(ev.id);
      render();
    });

    const nameEl = document.createElement('div');
    nameEl.className = 'ev-name';
    nameEl.style.paddingRight = '16px'; // space for star
    const link = document.createElement('a');
    link.href = ev.url;
    link.target = '_blank';
    link.textContent = ev.name;
    link.title = ev.name;
    nameEl.appendChild(link);

    const timeEl = document.createElement('div');
    timeEl.className = 'ev-time';
    timeEl.textContent = ev.time;

    const priceEl = document.createElement('div');
    priceEl.className = 'ev-price';
    priceEl.textContent = ev.price;

    const tagsEl = document.createElement('div');
    tagsEl.className = 'ev-tags';
    ev.tags.forEach(t => {
      const pill = document.createElement('span');
      pill.className = 'ev-tag';
      const c = tagColor(t);
      pill.style.background = c + '33';
      pill.style.color = c;
      pill.textContent = t;
      tagsEl.appendChild(pill);
    });

    card.appendChild(starEl);
    card.appendChild(nameEl);
    card.appendChild(timeEl);
    card.appendChild(priceEl);
    card.appendChild(tagsEl);

    card.addEventListener('mouseenter', e => showTooltip(ev, card.getBoundingClientRect()));
    card.addEventListener('mouseleave', hideTooltip);
    card.addEventListener('click', e => {
      if (e.target.tagName === 'A' || e.target.classList.contains('ev-star')) return;
      showTooltip(ev, card.getBoundingClientRect());
    });

    grid.appendChild(card);
  });
}

// Cost Panel
const DAY_LABELS = {'2026-07-17':'Friday Jul 17','2026-07-18':'Saturday Jul 18','2026-07-19':'Sunday Jul 19'};

function renderCostPanel() {
  const listEl = document.getElementById('costList');
  const totalEl = document.getElementById('costTotal');
  listEl.innerHTML = '';

  const starred = EVENTS.filter(ev => starredIds.has(ev.id));
  if (starred.length === 0) {
    listEl.innerHTML = '<div class="cost-empty"><div class="ce-icon">★</div>No events starred yet.<br>Star events from the calendar or search below to build your list.</div>';
    totalEl.style.display = 'none';
    return;
  }

  // Group by day
  const byDay = {};
  starred.forEach(ev => {
    if (!byDay[ev.date]) byDay[ev.date] = [];
    byDay[ev.date].push(ev);
  });

  let total = 0;
  ['2026-07-17','2026-07-18','2026-07-19'].forEach(day => {
    if (!byDay[day]) return;
    const group = document.createElement('div');
    group.className = 'cost-day-group';
    const title = document.createElement('div');
    title.className = 'cost-day-title';
    title.textContent = DAY_LABELS[day] + ' (' + byDay[day].length + ')';
    group.appendChild(title);

    byDay[day].sort((a, b) => (a.sH * 60 + a.sM) - (b.sH * 60 + b.sM));
    byDay[day].forEach(ev => {
      const row = document.createElement('div');
      row.className = 'cost-row';

      const name = document.createElement('div');
      name.className = 'cr-name';
      const a = document.createElement('a');
      a.href = ev.url; a.target = '_blank'; a.textContent = ev.name;
      name.appendChild(a);

      const time = document.createElement('div');
      time.className = 'cr-time';
      time.textContent = ev.time;

      const price = document.createElement('div');
      price.className = 'cr-price';
      price.textContent = ev.price;

      const remove = document.createElement('div');
      remove.className = 'cr-remove';
      remove.textContent = '✕';
      remove.title = 'Remove from list';
      remove.addEventListener('click', () => {
        starredIds.delete(ev.id);
        saveStarred();
        renderCostPanel();
      });

      row.appendChild(name);
      row.appendChild(time);
      row.appendChild(price);
      row.appendChild(remove);
      group.appendChild(row);

      // Parse price
      const m = ev.price.match(/€\s*([\d,.]+)/);
      if (m) total += parseFloat(m[1].replace(',', '.'));
    });

    listEl.appendChild(group);
  });

  totalEl.style.display = '';
  document.getElementById('costAmount').textContent = '€' + total.toFixed(0);
}

// Autocomplete for cost search
const costSearchInput = document.getElementById('costSearch');
const acDropdown = document.getElementById('acDropdown');

costSearchInput.addEventListener('input', () => {
  const q = costSearchInput.value.trim().toLowerCase();
  if (q.length < 2) { acDropdown.classList.remove('show'); return; }

  const matches = EVENTS.filter(ev => ev.name.toLowerCase().includes(q)).slice(0, 15);
  if (matches.length === 0) { acDropdown.classList.remove('show'); return; }

  acDropdown.innerHTML = '';
  matches.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'ac-item';

    const name = document.createElement('span');
    name.className = 'ac-name';
    name.textContent = ev.name;

    const meta = document.createElement('span');
    meta.className = 'ac-meta';
    meta.textContent = DAY_LABELS[ev.date] + ' · ' + ev.price;

    const star = document.createElement('span');
    star.className = 'ac-star' + (starredIds.has(ev.id) ? ' is-starred' : '');
    star.textContent = starredIds.has(ev.id) ? '★' : '☆';

    item.appendChild(name);
    item.appendChild(meta);
    item.appendChild(star);

    item.addEventListener('click', () => {
      toggleStar(ev.id);
      // Update dropdown star
      star.className = 'ac-star' + (starredIds.has(ev.id) ? ' is-starred' : '');
      star.textContent = starredIds.has(ev.id) ? '★' : '☆';
      renderCostPanel();
    });

    acDropdown.appendChild(item);
  });
  acDropdown.classList.add('show');
});

costSearchInput.addEventListener('blur', () => {
  setTimeout(() => acDropdown.classList.remove('show'), 200);
});
costSearchInput.addEventListener('focus', () => {
  if (costSearchInput.value.trim().length >= 2) costSearchInput.dispatchEvent(new Event('input'));
});

updateStarredCount();

render();
</script>
